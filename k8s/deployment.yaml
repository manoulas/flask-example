apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-example
spec:
  selector:
    matchLabels:
      app: flask-pod
  template:
    metadata:
      labels:
        app: flask-pod
    spec:
      containers:
        - name: flask-container
          image: docker.io/library/flask-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              hostPort: 7080
